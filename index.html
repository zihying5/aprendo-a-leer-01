<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprendo a Leer - Práctica de Alfabetización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        .main-content {
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .canvas-container {
            border: 4px dashed #cbd5e1;
            background: white;
            border-radius: 1.5rem;
            position: relative;
            touch-action: none;
            width: 100%;
            flex-grow: 1;
            max-height: 55vh;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tracing-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10rem;
            font-weight: bold;
            color: #f1f5f9;
            pointer-events: none;
            user-select: none;
            z-index: 0;
            white-space: nowrap;
        }

        #main-canvas, #repaso-canvas {
            position: relative;
            z-index: 10;
            background: transparent;
        }

        @media (max-height: 700px) {
            .tracing-overlay { font-size: 8rem; }
            .text-6xl { font-size: 3.5rem; }
        }

        .star-animation {
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0 { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .selected-option {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="flex flex-col h-full w-full">

    <header id="game-header" class="hidden h-20 p-4 bg-white shadow-sm border-b shrink-0 z-20">
        <div class="flex justify-between items-center mb-2">
            <button onclick="goBack()" class="text-blue-500 font-bold flex items-center">
                <span>←</span> <span class="ml-1 text-sm">Salir</span>
            </button>
            <div class="flex items-center space-x-3">
                <div id="timer-display" class="flex items-center text-blue-600 font-mono font-bold text-lg bg-blue-50 px-2 py-0.5 rounded-full">
                    ⏱️ <span id="time-count">0</span>s
                </div>
                <div id="stars-display" class="flex items-center text-yellow-500 font-bold text-xl">
                    ⭐ <span id="star-count">0</span>
                </div>
            </div>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2">
            <div id="progress-bar" class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </header>

    <main id="app" class="flex-grow flex flex-col items-center justify-center p-4 overflow-hidden relative">
        
        <div id="menu-view" class="w-full max-w-md h-full flex flex-col space-y-4 py-4">
            <div class="text-center shrink-0">
                <h1 class="text-4xl font-bold text-blue-600">¡Hola! ☺️</h1>
                <p class="text-gray-500">Elige una lección</p>
            </div>

            <div class="flex-grow overflow-y-auto space-y-4 px-1">
                <div class="bg-white p-5 rounded-3xl shadow-md border-b-8 border-blue-200">
                    <h2 class="text-xl font-bold text-blue-800 mb-3">Unidad A: a e i o u</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="handleUnitClick('A', 0)" id="btn-A-0" class="p-3 rounded-xl bg-orange-100 text-orange-600 font-bold text-sm">Nivel 0 (Repaso)</button>
                        <button onclick="handleUnitClick('A', 1)" id="btn-A-1" class="p-3 rounded-xl bg-blue-50 text-blue-600 font-bold text-sm">Nivel 1</button>
                        <button onclick="handleUnitClick('A', 2)" id="btn-A-2" class="p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm">Nivel 2</button>
                        <button onclick="handleUnitClick('A', 3)" id="btn-A-3" class="p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm">Nivel 3</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-md border-b-8 border-purple-200">
                    <h2 class="text-xl font-bold text-purple-800 mb-3">Unidad B: p / l</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="handleUnitClick('B', 0)" id="btn-B-0" class="p-3 rounded-xl bg-orange-100 text-orange-600 font-bold text-sm">Nivel 0 (Repaso)</button>
                        <button onclick="handleUnitClick('B', 1)" id="btn-B-1" class="p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm">Nivel 1</button>
                        <button onclick="handleUnitClick('B', 2)" id="btn-B-2" class="p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm">Nivel 2</button>
                        <button onclick="handleUnitClick('B', 3)" id="btn-B-3" class="p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm">Nivel 3</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="instruction-view" class="hidden w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-500 text-center flex flex-col justify-center space-y-8 my-auto">
            <div id="instruction-icon" class="text-8xl">👂</div>
            <div>
                <h3 id="instruction-title" class="text-3xl font-bold text-gray-800"></h3>
                <p id="instruction-desc" class="text-gray-500 mt-2"></p>
            </div>
            <button onclick="startLevelFromInstruction()" class="w-full py-5 bg-blue-600 text-white rounded-full font-bold text-2xl shadow-lg active:scale-95 transition-transform">
                ¡Empezar!
            </button>
        </div>

        <div id="level-view" class="hidden w-full max-w-md h-full flex flex-col items-center justify-center">
            <div id="question-container" class="w-full h-full flex flex-col items-center justify-center py-2 space-y-4"></div>
        </div>

        <div id="repaso-view" class="hidden w-full max-w-md h-full flex flex-col items-center justify-center space-y-4">
            <div id="flashcard-container" class="flex-grow flex flex-col items-center justify-center w-full min-h-0"></div>
            <div class="w-full grid grid-cols-2 gap-3 pb-6 shrink-0">
                <button onclick="clearRepasoCanvas()" class="py-4 bg-gray-200 text-gray-700 rounded-full font-bold text-lg">Borrar</button>
                <button onclick="nextFlashcard()" id="next-flashcard-btn" class="py-4 bg-orange-500 text-white rounded-full font-bold text-lg shadow-lg">Siguiente</button>
            </div>
        </div>

        <div id="compare-view" class="hidden w-full max-w-md h-full flex flex-col items-center justify-center space-y-6">
            <h3 class="text-xl font-bold text-gray-700 shrink-0">Compara tu escritura:</h3>
            <div class="w-full grid grid-cols-2 gap-4 flex-grow items-center">
                <div class="flex flex-col items-center">
                    <span class="text-xs font-bold text-gray-400 mb-1 uppercase text-center">Tu escrito</span>
                    <div id="user-draw-preview" class="w-full aspect-square bg-white rounded-2xl border-2 border-gray-100 overflow-hidden"></div>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-xs font-bold text-gray-400 mb-1 uppercase text-center">Correcto</span>
                    <div id="correct-text-preview" class="w-full aspect-square bg-blue-50 rounded-2xl border-2 border-blue-100 flex items-center justify-center text-5xl font-bold text-blue-600"></div>
                </div>
            </div>
            <div class="flex flex-col space-y-3 w-full pb-6 shrink-0">
                <button onclick="proceedAfterCompare()" class="w-full py-4 bg-green-500 text-white rounded-full font-bold text-xl shadow-lg">Siguiente</button>
                <button onclick="retryWriting()" class="w-full py-3 bg-white text-blue-600 border-2 border-blue-600 rounded-full font-bold text-lg">Reintentar</button>
            </div>
        </div>

        <div id="complete-view" class="hidden text-center flex flex-col items-center justify-center h-full space-y-6">
            <div id="result-medal" class="bg-yellow-400 w-28 h-28 rounded-full flex items-center justify-center text-5xl shadow-xl star-animation">🏅</div>
            <div>
                <h2 id="result-title" class="text-3xl font-bold text-gray-800 mb-1">¡Excelente! ☺️</h2>
                <div class="flex flex-col items-center space-y-1">
                    <p id="result-score" class="text-lg text-gray-600 font-bold"></p>
                    <p id="result-time" class="text-md text-blue-600 font-bold bg-blue-50 px-4 py-1 rounded-full"></p>
                </div>
            </div>
            <div class="flex flex-col space-y-3 w-64">
                <button id="next-level-btn" onclick="goToNextLevel()" class="px-8 py-4 bg-blue-600 text-white rounded-full font-bold text-lg shadow-lg">Siguiente Nivel</button>
                <button id="retry-btn" onclick="retryLevel()" class="hidden px-8 py-4 bg-orange-500 text-white rounded-full font-bold text-lg shadow-lg">Otra vez</button>
                <button onclick="goBack()" class="px-8 py-3 bg-white text-gray-600 border rounded-full font-bold text-md">Ir al Menú</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-4 right-4">
        <button onclick="handleTeacherClick()" id="teacher-toggle" class="bg-white p-2 rounded-full shadow-md border opacity-5 hover:opacity-30">⚙️</button>
    </div>

    <script>
        const SYLLABLE_HINTS = {
            'lila': 'lí la', 'ala': 'á la', 'ola': 'ola', 'pala': 'pá la', 'pelo': 'pé lo', 'lu': 'lú', 'pila': 'pí la', 'pipa': 'pí pa'
        };

        const UNITS = {
            A: [
                { word: 'a', icon: '' }, { word: 'e', icon: '' }, { word: 'i', icon: '' }, { word: 'o', icon: '' }, { word: 'u', icon: '' },
                { word: 'ala', icon: '🪽' }, { word: 'ola', icon: '🌊' }, { word: 'lila', icon: '🟣' }
            ],
            B: [
                { word: 'pa', icon: '' }, { word: 'pe', icon: '' }, { word: 'pi', icon: '' }, { word: 'po', icon: '' }, { word: 'pu', icon: '' },
                { word: 'la', icon: '' }, { word: 'le', icon: '' }, { word: 'li', icon: '' }, { word: 'lo', icon: '' }, { word: 'lu', icon: '' },
                { word: 'pala', icon: '🪏' }, { word: 'pelo', icon: '💇‍♂️' }, { word: 'pila', icon: '' }, { word: 'pipa', icon: '' }
            ]
        };

        const INSTRUCTIONS = {
            0: { icon: '✍️', title: 'Mira y Traza', desc: '' },
            1: { icon: '👂', title: 'Escucha y Elige', desc: '' },
            2: { icon: '📖', title: 'Mira y Elige', desc: '' },
            3: { icon: '✍️', title: 'Escucha y Escribe', desc: '' }
        };

        let state = {
            currentUnit: null,
            currentLevel: null,
            questions: [],
            currentIndex: 0,
            stars: 0,
            isFirstAttempt: true, // 追蹤是否為第一次嘗試作答
            teacherMode: false,
            teacherClicks: 0,
            unlocked: { A: 0, B: 0 },
            selectedOption: null,
            voices: { male: null, female: null },
            voiceToggle: true,
            isRetrying: false,
            timer: null,
            seconds: 0,
            repasoCanvasCtx: null
        };

        function startTimer() {
            stopTimer(); state.seconds = 0; updateTimerUI();
            state.timer = setInterval(() => { state.seconds++; updateTimerUI(); }, 1000);
        }

        function stopTimer() { if (state.timer) clearInterval(state.timer); state.timer = null; }
        function updateTimerUI() {
            const timerEl = document.getElementById('time-count');
            if (timerEl) timerEl.innerText = state.seconds;
        }

        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            const es = v.filter(voice => voice.lang.includes('es'));
            state.voices.female = es.find(voice => voice.name.includes('Monica') || voice.name.includes('Paulina') || voice.name.includes('Google') || voice.name.includes('Helena')) || es[0];
            state.voices.male = es.find(voice => voice.name.includes('Jorge') || (voice.name.includes('Google') && !voice.name.includes('female'))) || es[es.length - 1];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text, callback) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const lowerText = text.toLowerCase();
            const processedText = SYLLABLE_HINTS[lowerText] || text;
            const ut = new SpeechSynthesisUtterance(processedText);
            if (['lu', 'lo', 'ala', 'ola', 'pila', 'pipa'].includes(lowerText)) {
                ut.voice = state.voices.male;
            } else {
                ut.voice = state.voiceToggle ? state.voices.female : state.voices.male;
                state.voiceToggle = !state.voiceToggle;
            }
            ut.lang = 'es-ES'; ut.rate = 0.6;
            if (callback) ut.onend = () => callback();
            window.speechSynthesis.speak(ut);
        }

        function handleUnitClick(unit, level) {
            const isUnlocked = state.teacherMode || (state.unlocked[unit] >= level);
            if (isUnlocked) showInstruction(unit, level);
        }

        function showInstruction(unit, level) {
            state.currentUnit = unit; state.currentLevel = level;
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            const view = document.getElementById('instruction-view');
            view.classList.remove('hidden');
            const ins = INSTRUCTIONS[level];
            document.getElementById('instruction-icon').innerText = ins.icon;
            document.getElementById('instruction-title').innerText = ins.title;
            document.getElementById('instruction-desc').innerText = ins.desc;
            speak(ins.title);
        }

        function startLevelFromInstruction() {
            document.getElementById('instruction-view').classList.add('hidden');
            if (state.currentLevel === 0) startRepaso();
            else startLevel(state.currentUnit, state.currentLevel);
        }

        function startRepaso() {
            state.currentIndex = 0;
            state.questions = UNITS[state.currentUnit];
            document.getElementById('repaso-view').classList.remove('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            startTimer();
            renderFlashcard();
        }

        function renderFlashcard() {
            const item = state.questions[state.currentIndex];
            const container = document.getElementById('flashcard-container');
            
            container.innerHTML = `
                <div class="text-center w-full flex flex-col items-center justify-center h-full">
                    <div class="flex items-center justify-center space-x-4 mb-2 shrink-0">
                        ${item.icon ? `<div class="text-6xl">${item.icon}</div>` : ''}
                        <button onclick="speak('${item.word}')" class="w-16 h-16 bg-blue-100 rounded-full text-2xl shadow-inner active:scale-90 transition-transform">🔊</button>
                    </div>
                    <p class="text-xs font-bold text-gray-400 mb-2 uppercase shrink-0">Traza la palabra:</p>
                    <div class="canvas-container shadow-inner">
                        <div class="tracing-overlay">${item.word}</div>
                        <canvas id="repaso-canvas" class="relative z-10 w-full h-full"></canvas>
                    </div>
                </div>
            `;
            
            document.getElementById('progress-bar').style.width = `${((state.currentIndex + 1) / state.questions.length) * 100}%`;
            document.getElementById('star-count').innerText = "📚";
            
            const canvas = document.getElementById('repaso-canvas');
            setTimeout(() => {
                initCanvas(canvas);
                state.repasoCanvasCtx = canvas.getContext('2d');
                speak(item.word);
            }, 50);

            const nextBtn = document.getElementById('next-flashcard-btn');
            nextBtn.innerText = (state.currentIndex === state.questions.length - 1) ? "¡Terminar!" : "Siguiente";
        }

        function clearRepasoCanvas() {
            if (state.repasoCanvasCtx) {
                const canvas = state.repasoCanvasCtx.canvas;
                state.repasoCanvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function nextFlashcard() {
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                renderFlashcard();
            } else {
                stopTimer();
                state.unlocked[state.currentUnit] = Math.max(state.unlocked[state.currentUnit], 1);
                showCompletion();
            }
        }

        function startLevel(unit, level) {
            state.currentIndex = 0; state.stars = 0; state.isRetrying = false; state.isFirstAttempt = true;
            const pool = UNITS[unit].map(u => u.word);
            state.questions = [];
            for(let i=0; i<10; i++) {
                const target = pool[Math.floor(Math.random() * pool.length)];
                let distractor = pool[Math.floor(Math.random() * pool.length)];
                while(distractor === target) distractor = pool[Math.floor(Math.random() * pool.length)];
                state.questions.push({ target, distractor });
            }
            document.getElementById('level-view').classList.remove('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            startTimer();
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.questions[state.currentIndex];
            const container = document.getElementById('question-container');
            container.innerHTML = '';
            state.selectedOption = null;
            state.isFirstAttempt = true; // 每題開始時重設為第一次嘗試
            document.getElementById('progress-bar').style.width = `${(state.currentIndex / 10) * 100}%`;
            document.getElementById('star-count').innerText = state.stars;

            if (state.currentLevel === 1 || state.currentLevel === 2) {
                const content = document.createElement('div');
                content.className = "flex-grow flex flex-col items-center justify-center w-full space-y-10";
                
                const soundBtn = createSoundBtn(q.target, 'w-28 h-28 bg-blue-500 text-5xl');
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 gap-4 w-full";
                const options = [q.target, q.distractor].sort(() => Math.random() - 0.5);
                options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "bg-white p-8 rounded-3xl text-4xl font-bold shadow-md border-4 border-transparent transition-all";
                    btn.innerText = opt; btn.id = `opt-l-${i}`;
                    btn.onclick = () => {
                        document.querySelectorAll('[id^="opt-l-"]').forEach(el => el.classList.remove('selected-option'));
                        btn.classList.add('selected-option');
                        state.selectedOption = opt; confirmBtn.disabled = false; confirmBtn.classList.remove('opacity-50');
                    };
                    grid.appendChild(btn);
                });
                
                const confirmBtn = createConfirmBtn(() => handleAnswer(state.selectedOption === q.target));
                content.appendChild(soundBtn); content.appendChild(grid);
                container.appendChild(content); container.appendChild(confirmBtn);
                speak(q.target);
            } else if (state.currentLevel === 3) {
                const mainArea = document.createElement('div');
                mainArea.className = "flex-grow flex flex-col items-center justify-center w-full space-y-4";

                const headerRow = document.createElement('div');
                headerRow.className = "flex items-center justify-center space-x-6 shrink-0";
                headerRow.appendChild(createSoundBtn(q.target, 'w-16 h-16 bg-purple-500 text-2xl'));
                
                const canvasBox = document.createElement('div');
                canvasBox.className = "canvas-container shadow-inner w-full";
                
                if (state.isRetrying) {
                    const overlay = document.createElement('div');
                    overlay.className = "tracing-overlay";
                    overlay.innerText = q.target;
                    canvasBox.appendChild(overlay);
                }

                const canvas = document.createElement('canvas'); canvas.id = "main-canvas";
                canvasBox.appendChild(canvas);
                
                const controls = document.createElement('div');
                controls.className = "flex space-x-4 w-full shrink-0 pb-4";
                const clearBtn = createUtilityBtn("Borrar", () => {});
                const nextBtn = createUtilityBtn("Listo", () => showComparison(canvas, q.target), true);
                controls.appendChild(clearBtn); controls.appendChild(nextBtn);
                
                mainArea.appendChild(headerRow);
                mainArea.appendChild(canvasBox);
                container.appendChild(mainArea);
                container.appendChild(controls);
                
                setTimeout(() => initCanvas(canvas, clearBtn), 50);
                speak(q.target);
            }
        }

        function createSoundBtn(val, cls) {
            const btn = document.createElement('button');
            btn.className = `${cls} rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform`;
            btn.innerHTML = "🔊"; btn.onclick = () => speak(val);
            return btn;
        }

        function createConfirmBtn(fn) {
            const btn = document.createElement('button');
            btn.className = "w-full py-6 bg-green-500 text-white rounded-full font-bold text-2xl shadow-lg opacity-50 shrink-0 mb-6";
            btn.innerText = "Confirmar"; btn.disabled = true; btn.onclick = fn;
            return btn;
        }

        function createUtilityBtn(txt, fn, primary=false) {
            const btn = document.createElement('button');
            btn.className = `flex-1 py-5 rounded-2xl font-bold text-xl ${primary ? 'bg-blue-600 text-white shadow-lg' : 'bg-gray-200 text-gray-700'}`;
            btn.innerText = txt; btn.onclick = fn;
            return btn;
        }

        function handleAnswer(isCorrect) {
            const q = state.questions[state.currentIndex];
            if(isCorrect) {
                // 只有第一次嘗試就對才加星星
                if (state.isFirstAttempt) {
                    state.stars++;
                }

                const encouragements = ["Muy bien", "Excelente", "Genial", "Bien hecho"];
                const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
                const icon = document.createElement('div');
                icon.className = "fixed inset-0 flex flex-col items-center justify-center pointer-events-none z-50 bg-white/20";
                icon.innerHTML = `<div class="text-9xl mb-4 star-animation">☺️</div><div class="bg-white px-8 py-3 rounded-full text-4xl font-bold text-blue-600 shadow-2xl star-animation border-4 border-blue-100">${msg} ${!state.isFirstAttempt ? ' ' : ''}</div>`;
                document.body.appendChild(icon);
                
                speak(msg, () => {
                    setTimeout(() => {
                        icon.remove(); state.currentIndex++;
                        if(state.currentIndex >= 10) { stopTimer(); showCompletion(); } else renderQuestion();
                    }, 500);
                });
            } else {
                // 一旦答錯，該題的 isFirstAttempt 就變為 false，這題就不會再給星星
                state.isFirstAttempt = false; 
                
                speak("Otra vez", () => {
                    if (state.currentLevel === 1 || state.currentLevel === 2) {
                        setTimeout(() => speak(q.target), 500);
                    }
                    
                    document.querySelectorAll('[id^="opt-l-"]').forEach(opt => {
                        if (opt.classList.contains('selected-option')) {
                            opt.classList.remove('selected-option');
                            opt.classList.add('border-red-500', 'bg-red-50');
                            setTimeout(() => opt.classList.remove('border-red-500', 'bg-red-50'), 800);
                        }
                    });
                    const confirmBtn = document.querySelector('button.bg-green-500');
                    if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.classList.add('opacity-50'); }
                    state.selectedOption = null;
                });
            }
        }

        function showCompletion() {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('complete-view').classList.remove('hidden');
            const scoreDisplay = document.getElementById('result-score');
            const medal = document.getElementById('result-medal');
            const nextBtn = document.getElementById('next-level-btn');
            const retryBtn = document.getElementById('retry-btn');
            document.getElementById('result-time').innerText = `⏱️ Tiempo: ${state.seconds}s`;

            if (state.currentLevel === 0) {
                scoreDisplay.innerText = "¡Terminado!"; medal.innerText = "📖";
                speak("¡Has terminado!"); nextBtn.classList.remove('hidden'); retryBtn.classList.add('hidden');
            } else {
                scoreDisplay.innerText = `Puntaje: ${state.stars} / 10`;
                // 必須獲得 6 顆星星（第一次作答對 6 題以上）才能進入下一關
                if(state.stars >= 6) {
                    medal.innerText = "🏅"; speak("Excelente");
                    nextBtn.classList.remove('hidden'); retryBtn.classList.add('hidden');
                    
                    // 獲得 8 分以上才算真正解鎖下一關
                    if(state.stars >= 8) {
                        if(state.currentLevel < 3) state.unlocked[state.currentUnit] = Math.max(state.unlocked[state.currentUnit], state.currentLevel + 1);
                        else if(state.currentUnit === 'A') state.unlocked.B = Math.max(state.unlocked.B, 0); 
                    }
                } else {
                    // 低於 6 分必須重來
                    medal.innerText = "💪"; speak("Otra vez");
                    nextBtn.classList.add('hidden'); retryBtn.classList.remove('hidden');
                }
            }
            updateMenuUI();
        }

        function retryLevel() { startLevel(state.currentUnit, state.currentLevel); }
        function goBack() {
            stopTimer(); window.speechSynthesis.cancel();
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            updateMenuUI();
        }

        function goToNextLevel() {
            let nl = state.currentLevel + 1;
            if (nl > 3) goBack(); else showInstruction(state.currentUnit, nl);
        }

        function updateMenuUI() {
            ['A', 'B'].forEach(u => {
                for(let l=0; l<=3; l++) {
                    const btn = document.getElementById(`btn-${u}-${l}`);
                    if (!btn) continue;
                    const isUnlocked = state.teacherMode || (state.unlocked[u] >= l);
                    if (isUnlocked) {
                        btn.disabled = false;
                        if (l === 0) btn.className = "p-3 rounded-xl bg-orange-100 text-orange-700 font-bold text-sm";
                        else btn.className = (u === 'A' ? "p-3 rounded-xl bg-blue-100 text-blue-700 font-bold text-sm" : "p-3 rounded-xl bg-purple-100 text-purple-700 font-bold text-sm");
                    } else {
                        btn.className = "p-3 rounded-xl bg-gray-50 text-gray-300 font-bold text-sm"; btn.disabled = true;
                    }
                }
            });
        }

        function showComparison(canvas, target) {
            document.getElementById('level-view').classList.add('hidden');
            document.getElementById('compare-view').classList.remove('hidden');
            const preview = document.getElementById('user-draw-preview');
            preview.innerHTML = '';
            const img = new Image(); img.src = canvas.toDataURL();
            img.className = "w-full h-full object-contain p-2";
            preview.appendChild(img);
            document.getElementById('correct-text-preview').innerText = target;
        }

        function retryWriting() { 
            state.isFirstAttempt = false; // 寫錯重寫也不給分
            state.isRetrying = true; 
            document.getElementById('compare-view').classList.add('hidden'); 
            document.getElementById('level-view').classList.remove('hidden'); 
            renderQuestion(); 
        }

        function proceedAfterCompare() { 
            state.isRetrying = false; 
            document.getElementById('compare-view').classList.add('hidden'); 
            document.getElementById('level-view').classList.remove('hidden'); 
            handleAnswer(true); 
        }

        function initCanvas(canvas, clearBtn) {
            const ctx = canvas.getContext('2d');
            const box = canvas.parentElement;
            canvas.width = box.offsetWidth; canvas.height = box.offsetHeight;
            ctx.lineWidth = 12; 
            ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
            let drawing = false;
            function getPos(e) { 
                const b = canvas.getBoundingClientRect(); 
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - b.left; 
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - b.top; 
                return {x, y}; 
            }
            canvas.onmousedown = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.onmousemove = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            window.onmouseup = () => drawing = false;
            canvas.ontouchstart = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.ontouchmove = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.ontouchend = () => drawing = false;
            if (clearBtn) clearBtn.onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function handleTeacherClick() {
            state.teacherClicks++;
            if (state.teacherClicks >= 3) {
                state.teacherMode = !state.teacherMode; state.teacherClicks = 0;
                updateMenuUI();
                document.getElementById('teacher-toggle').classList.toggle('opacity-30', state.teacherMode);
            }
        }
        updateMenuUI();
    </script>
</body>
</html>
