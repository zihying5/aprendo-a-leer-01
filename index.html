<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprendo a Leer - Práctica de Alfabetización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
            overflow: hidden;
        }

        .canvas-container {
            border: 4px dashed #cbd5e1;
            background: white;
            border-radius: 1.5rem;
            position: relative;
            touch-action: none;
            width: 100%;
        }

        .star-animation {
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0 { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .selected-option {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }

        .instruction-card {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .flashcard-enter {
            animation: fadeInRight 0.4s ease-out;
        }

        @keyframes fadeInRight {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 頂部欄 / 進度條 -->
    <header id="game-header" class="hidden p-4 bg-white shadow-sm border-b">
        <div class="flex justify-between items-center mb-3">
            <button onclick="goBack()" class="text-blue-500 font-bold flex items-center">
                <span>←</span> <span class="ml-1">Salir</span>
            </button>
            <div id="stars-display" class="flex items-center text-yellow-500 font-bold text-2xl">
                ⭐ <span id="star-count" class="ml-1">0</span>
            </div>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-3">
            <div id="progress-bar" class="bg-green-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main id="app" class="flex-grow flex flex-col items-center justify-center p-6 overflow-hidden">
        
        <!-- 選單畫面 -->
        <div id="menu-view" class="w-full max-w-md space-y-6 overflow-y-auto pb-10">
            <div class="text-center py-4">
                <h1 class="text-5xl font-bold text-blue-600 mb-2">¡Hola! ☺️</h1>
                <p class="text-gray-500 text-lg">Elige una lección</p>
            </div>

            <div class="space-y-6">
                <!-- Unidad A -->
                <div class="bg-white p-6 rounded-3xl shadow-md border-b-8 border-blue-200">
                    <h2 class="text-2xl font-bold text-blue-800 mb-4">Unidad A: a e i o u</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="handleUnitClick('A', 0)" id="btn-A-0" class="p-4 rounded-2xl bg-orange-100 text-orange-600 font-bold">Nivel 0 (Repaso)</button>
                        <button onclick="handleUnitClick('A', 1)" id="btn-A-1" class="p-4 rounded-2xl bg-blue-50 text-blue-600 font-bold">Nivel 1</button>
                        <button onclick="handleUnitClick('A', 2)" id="btn-A-2" class="p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold">Nivel 2</button>
                        <button onclick="handleUnitClick('A', 3)" id="btn-A-3" class="p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold">Nivel 3</button>
                    </div>
                </div>

                <!-- Unidad B -->
                <div class="bg-white p-6 rounded-3xl shadow-md border-b-8 border-purple-200">
                    <h2 class="text-2xl font-bold text-purple-800 mb-4">Unidad B: p / l</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="handleUnitClick('B', 0)" id="btn-B-0" class="p-4 rounded-2xl bg-orange-100 text-orange-600 font-bold">Nivel 0 (Repaso)</button>
                        <button onclick="handleUnitClick('B', 1)" id="btn-B-1" class="p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold">Nivel 1</button>
                        <button onclick="handleUnitClick('B', 2)" id="btn-B-2" class="p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold">Nivel 2</button>
                        <button onclick="handleUnitClick('B', 3)" id="btn-B-3" class="p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold">Nivel 3</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 指示畫面 -->
        <div id="instruction-view" class="hidden w-full max-w-md instruction-card bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-500 text-center space-y-6">
            <div id="instruction-icon" class="text-6xl">👂</div>
            <h3 id="instruction-title" class="text-3xl font-bold text-gray-800"></h3>
            <p id="instruction-desc" class="hidden"></p>

            <button onclick="startLevelFromInstruction()" class="w-full py-4 bg-blue-600 text-white rounded-full font-bold text-2xl shadow-lg active:scale-95 transition-transform">
                ¡Empezar!
            </button>
        </div>

        <!-- 遊戲關卡畫面 -->
        <div id="level-view" class="hidden w-full max-w-md flex flex-col items-center h-full">
            <div id="question-container" class="w-full flex flex-col items-center justify-center flex-grow space-y-6">
                <!-- 動態注入內容 -->
            </div>
        </div>

        <!-- 複習模式畫面 (Nivel 0) -->
        <div id="repaso-view" class="hidden w-full max-w-md flex flex-col items-center h-full space-y-8">
            <div id="flashcard-container" class="flex-grow flex flex-col items-center justify-center w-full">
                <!-- 動態注入內容 -->
            </div>
            <div class="w-full pb-10">
                <button onclick="nextFlashcard()" id="next-flashcard-btn" class="w-full py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-lg">
                    Siguiente
                </button>
            </div>
        </div>

        <!-- 寫字比對畫面 (L3) -->
        <div id="compare-view" class="hidden w-full max-w-md flex flex-col items-center space-y-6">
            <h3 class="text-2xl font-bold text-gray-700">Compara tu escritura:</h3>
            <div class="w-full grid grid-cols-2 gap-4">
                <div class="flex flex-col items-center">
                    <span class="text-sm font-bold text-gray-400 mb-2 uppercase">Tu escrito</span>
                    <div id="user-draw-preview" class="w-full aspect-square bg-white rounded-2xl border-2 border-gray-100 overflow-hidden"></div>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-sm font-bold text-gray-400 mb-2 uppercase">Correcto</span>
                    <div id="correct-text-preview" class="w-full aspect-square bg-blue-50 rounded-2xl border-2 border-blue-100 flex items-center justify-center text-6xl font-bold text-blue-600"></div>
                </div>
            </div>
            <div class="flex flex-col space-y-3 w-full">
                <button onclick="proceedAfterCompare()" class="w-full py-5 bg-green-500 text-white rounded-full font-bold text-2xl shadow-lg">
                    Siguiente
                </button>
                <button onclick="retryWriting()" class="w-full py-4 bg-white text-blue-600 border-2 border-blue-600 rounded-full font-bold text-xl">
                    Reintentar
                </button>
            </div>
        </div>

        <!-- 完成畫面 -->
        <div id="complete-view" class="hidden text-center space-y-8">
            <div id="result-medal" class="bg-yellow-400 w-32 h-32 rounded-full flex items-center justify-center text-6xl shadow-xl mx-auto mb-4 star-animation">🏅</div>
            <div>
                <h2 id="result-title" class="text-4xl font-bold text-gray-800 mb-2">¡Excelente! ☺️</h2>
                <p id="result-score" class="text-xl text-gray-600 font-bold mb-4"></p>
            </div>
            <div id="complete-actions" class="flex flex-col space-y-3 w-64 mx-auto">
                <button id="next-level-btn" onclick="goToNextLevel()" class="px-8 py-4 bg-blue-600 text-white rounded-full font-bold text-xl shadow-lg">Siguiente Nivel</button>
                <button id="retry-btn" onclick="retryLevel()" class="hidden px-8 py-4 bg-orange-500 text-white rounded-full font-bold text-xl shadow-lg">Otra vez</button>
                <button onclick="goBack()" class="px-8 py-4 bg-white text-gray-600 border rounded-full font-bold text-lg">Ir al Menú</button>
            </div>
        </div>
    </main>

    <!-- 教師模式切換 -->
    <div class="fixed bottom-6 right-6">
        <button onclick="handleTeacherClick()" id="teacher-toggle" class="bg-white p-3 rounded-full shadow-md border opacity-10 hover:opacity-50 transition-opacity">⚙️</button>
    </div>

    <script>
        const SYLLABLE_HINTS = {
            'lila': 'li la',
            'ala': 'a la',
            'ola': 'o la',
            'lulo': 'lu lo',
            'pala': 'pa la',
            'pelo': 'pe lo',
            'lo': 'low',
            'lu': 'loo'
        };

        const UNITS = {
            A: [
                { word: 'a', icon: '' },
                { word: 'e', icon: '' },
                { word: 'i', icon: '' },
                { word: 'o', icon: '' },
                { word: 'u', icon: '' },
                { word: 'ala', icon: '🪽' },
                { word: 'ola', icon: '🌊' },
                { word: 'lila', icon: '🟣' }
            ],
            B: [
                { word: 'pa', icon: '' }, { word: 'pe', icon: '' }, { word: 'pi', icon: '' }, { word: 'po', icon: '' }, { word: 'pu', icon: '' },
                { word: 'la', icon: '' }, { word: 'le', icon: '' }, { word: 'li', icon: '' }, { word: 'lo', icon: '' }, { word: 'lu', icon: '' },
                { word: 'pala', icon: '🧹' }, { word: 'pelo', icon: '💇' }, { word: 'lulo', icon: '🍈' }
            ]
        };

        const INSTRUCTIONS = {
            0: { icon: '📺', title: 'Mira y Aprende', desc: '' },
            1: { icon: '👂', title: 'Escucha y Elige', desc: '' },
            2: { icon: '📖', title: 'Mira y Elige', desc: '' },
            3: { icon: '✍️', title: 'Escucha y Escribe', desc: '' }
        };

        let state = {
            currentUnit: null,
            currentLevel: null,
            questions: [],
            currentIndex: 0,
            stars: 0,
            teacherMode: false,
            teacherClicks: 0,
            unlocked: { A: 0, B: 0 },
            selectedOption: null,
            voices: { male: null, female: null },
            voiceToggle: true,
            isRetrying: false
        };

        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            const es = v.filter(voice => voice.lang.includes('es'));
            state.voices.female = es.find(voice => voice.name.includes('Monica') || voice.name.includes('Paulina') || voice.name.includes('Google') || voice.name.includes('Helena')) || es[0];
            state.voices.male = es.find(voice => voice.name.includes('Jorge') || (voice.name.includes('Google') && !voice.name.includes('female'))) || es[es.length - 1];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text, callback) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const lowerText = text.toLowerCase();
            const processedText = SYLLABLE_HINTS[lowerText] || text;
            const ut = new SpeechSynthesisUtterance(processedText);
            
            // 強制 ala 和 ola 使用男性聲音
            if (lowerText === 'lu' || lowerText === 'lo' || lowerText === 'ala' || lowerText === 'ola') {
                ut.voice = state.voices.male;
            } else {
                ut.voice = state.voiceToggle ? state.voices.female : state.voices.male;
                state.voiceToggle = !state.voiceToggle;
            }
            
            ut.lang = 'es-ES';
            ut.rate = 0.65;
            if (callback) ut.onend = () => callback();
            window.speechSynthesis.speak(ut);
        }

        function handleUnitClick(unit, level) {
            const isUnlocked = state.teacherMode || (state.unlocked[unit] >= level);
            if (isUnlocked) {
                showInstruction(unit, level);
            }
        }

        function showInstruction(unit, level) {
            state.currentUnit = unit;
            state.currentLevel = level;
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            const view = document.getElementById('instruction-view');
            view.classList.remove('hidden');
            const ins = INSTRUCTIONS[level];
            document.getElementById('instruction-icon').innerText = ins.icon;
            document.getElementById('instruction-title').innerText = ins.title;
            
            const descEl = document.getElementById('instruction-desc');
            if (ins.desc) {
                descEl.innerText = ins.desc;
                descEl.classList.remove('hidden');
            } else {
                descEl.classList.add('hidden');
            }
            
            speak(ins.title);
        }

        function startLevelFromInstruction() {
            document.getElementById('instruction-view').classList.add('hidden');
            if (state.currentLevel === 0) startRepaso();
            else startLevel(state.currentUnit, state.currentLevel);
        }

        function startRepaso() {
            state.currentIndex = 0;
            state.questions = UNITS[state.currentUnit];
            document.getElementById('repaso-view').classList.remove('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            renderFlashcard();
        }

        function renderFlashcard() {
            const item = state.questions[state.currentIndex];
            const container = document.getElementById('flashcard-container');
            const iconHtml = item.icon ? `<div class="text-[120px] mb-4">${item.icon}</div>` : '';
            
            container.innerHTML = `
                <div class="flashcard-enter text-center space-y-6">
                    ${iconHtml}
                    <div class="text-7xl font-bold text-blue-600">${item.word}</div>
                    <button onclick="speak('${item.word}')" class="w-20 h-20 bg-blue-100 rounded-full text-3xl mx-auto shadow-inner active:scale-90 transition-transform">🔊</button>
                </div>
            `;
            
            document.getElementById('progress-bar').style.width = `${((state.currentIndex + 1) / state.questions.length) * 100}%`;
            document.getElementById('star-count').innerText = "📚";
            setTimeout(() => speak(item.word), 300);

            const nextBtn = document.getElementById('next-flashcard-btn');
            nextBtn.innerText = (state.currentIndex === state.questions.length - 1) ? "¡Terminar Repaso!" : "Siguiente";
        }

        function nextFlashcard() {
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                renderFlashcard();
            } else {
                state.unlocked[state.currentUnit] = Math.max(state.unlocked[state.currentUnit], 1);
                showCompletion();
            }
        }

        function startLevel(unit, level) {
            state.currentIndex = 0;
            state.stars = 0;
            state.isRetrying = false;
            const pool = UNITS[unit].map(u => u.word);
            state.questions = [];
            for(let i=0; i<10; i++) {
                const target = pool[Math.floor(Math.random() * pool.length)];
                let distractor = pool[Math.floor(Math.random() * pool.length)];
                while(distractor === target) distractor = pool[Math.floor(Math.random() * pool.length)];
                state.questions.push({ target, distractor });
            }
            document.getElementById('level-view').classList.remove('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.questions[state.currentIndex];
            const container = document.getElementById('question-container');
            container.innerHTML = '';
            state.selectedOption = null;

            document.getElementById('progress-bar').style.width = `${(state.currentIndex / 10) * 100}%`;
            document.getElementById('star-count').innerText = state.stars;

            if (state.currentLevel === 1 || state.currentLevel === 2) {
                const soundBtn = createSoundBtn(q.target, 'w-32 h-32 bg-blue-500 text-5xl');
                const confirmBtn = createConfirmBtn(() => handleAnswer(state.selectedOption === q.target));
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 gap-4 w-full mb-6";
                const options = [q.target, q.distractor].sort(() => Math.random() - 0.5);
                
                options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "bg-white p-8 rounded-3xl text-4xl font-bold shadow-md border-4 border-transparent transition-all";
                    btn.innerText = opt;
                    btn.id = `opt-l-${i}`;
                    btn.onclick = () => {
                        document.querySelectorAll('[id^="opt-l-"]').forEach(el => el.classList.remove('selected-option'));
                        btn.classList.add('selected-option');
                        state.selectedOption = opt;
                        confirmBtn.disabled = false;
                        confirmBtn.classList.remove('opacity-50');
                    };
                    grid.appendChild(btn);
                });
                container.appendChild(soundBtn);
                container.appendChild(grid);
                container.appendChild(confirmBtn);
                speak(q.target);

            } else if (state.currentLevel === 3) {
                const headerRow = document.createElement('div');
                headerRow.className = "flex items-center justify-center space-x-6 mb-4";
                if (state.isRetrying) {
                    const hint = document.createElement('div');
                    hint.className = "text-6xl font-bold text-blue-500";
                    hint.innerText = q.target;
                    headerRow.appendChild(hint);
                }
                const soundBtn = createSoundBtn(q.target, 'w-24 h-24 bg-purple-500 text-4xl');
                headerRow.appendChild(soundBtn);
                const canvasBox = document.createElement('div');
                canvasBox.className = "w-full aspect-[4/3] canvas-container mb-4 shadow-inner";
                const canvas = document.createElement('canvas');
                canvas.id = "main-canvas";
                canvasBox.appendChild(canvas);
                const controls = document.createElement('div');
                controls.className = "flex space-x-4 w-full";
                const clearBtn = createUtilityBtn("Borrar", () => {});
                const nextBtn = createUtilityBtn("Listo", () => showComparison(canvas, q.target), true);
                container.appendChild(headerRow);
                container.appendChild(canvasBox);
                controls.appendChild(clearBtn);
                controls.appendChild(nextBtn);
                container.appendChild(controls);
                setTimeout(() => initCanvas(canvas, clearBtn), 50);
                speak(q.target);
            }
        }

        function createSoundBtn(val, cls) {
            const btn = document.createElement('button');
            btn.className = `${cls} rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform`;
            btn.innerHTML = "🔊";
            btn.onclick = () => speak(val);
            return btn;
        }

        function createConfirmBtn(fn) {
            const btn = document.createElement('button');
            btn.className = "w-full py-5 bg-green-500 text-white rounded-full font-bold text-2xl shadow-lg opacity-50";
            btn.innerText = "Confirmar";
            btn.disabled = true;
            btn.onclick = fn;
            return btn;
        }

        function createUtilityBtn(txt, fn, primary=false) {
            const btn = document.createElement('button');
            btn.className = `flex-1 py-5 rounded-2xl font-bold text-xl ${primary ? 'bg-blue-600 text-white shadow-lg' : 'bg-gray-200 text-gray-700'}`;
            btn.innerText = txt;
            btn.onclick = fn;
            return btn;
        }

        function handleAnswer(isCorrect) {
            const nextAction = () => {
                setTimeout(() => {
                    if(state.currentIndex >= 10) showCompletion();
                    else renderQuestion();
                }, 600);
            };
            if(isCorrect) {
                state.stars++;
                const encouragements = ["Muy bien", "Excelente", "Genial", "Bien hecho"];
                const randomEncouragement = encouragements[Math.floor(Math.random() * encouragements.length)];
                speak(randomEncouragement, nextAction);
                const icon = document.createElement('div');
                icon.className = "fixed inset-0 flex flex-col items-center justify-center pointer-events-none z-50";
                icon.innerHTML = `<div class="text-9xl mb-4 star-animation">☺️</div><div class="bg-white/80 px-6 py-2 rounded-full text-4xl font-bold text-blue-600 shadow-xl star-animation">${randomEncouragement}</div>`;
                document.body.appendChild(icon);
                setTimeout(() => icon.remove(), 1000);
            } else {
                speak("Otra vez", nextAction);
                const current = state.questions[state.currentIndex];
                state.questions.push({...current});
            }
            state.currentIndex++;
        }

        function showCompletion() {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('complete-view').classList.remove('hidden');
            
            const scoreDisplay = document.getElementById('result-score');
            const medal = document.getElementById('result-medal');
            const titleDisplay = document.getElementById('result-title');
            const nextBtn = document.getElementById('next-level-btn');
            const retryBtn = document.getElementById('retry-btn');

            if (state.currentLevel === 0) {
                const finishMsg = "¡Has terminado el repaso!";
                scoreDisplay.innerText = finishMsg;
                medal.innerText = "📖";
                speak(finishMsg);
                nextBtn.classList.remove('hidden');
                retryBtn.classList.add('hidden');
            } else {
                scoreDisplay.innerText = `Puntaje: ${state.stars} / 10`;
                if(state.stars >= 6) {
                    titleDisplay.innerText = "¡Excelente! ☺️";
                    medal.innerText = "🏅";
                    speak("Excelente");
                    nextBtn.classList.remove('hidden');
                    retryBtn.classList.add('hidden');
                    if(state.stars >= 8) {
                        const maxL = 3;
                        if(state.currentLevel < maxL) state.unlocked[state.currentUnit] = Math.max(state.unlocked[state.currentUnit], state.currentLevel + 1);
                        else if(state.currentUnit === 'A') state.unlocked.B = Math.max(state.unlocked.B, 0); 
                    }
                } else {
                    titleDisplay.innerText = "¡Otra vez! 💪";
                    medal.innerText = "💪";
                    speak("Otra vez");
                    nextBtn.classList.add('hidden');
                    retryBtn.classList.remove('hidden');
                }
            }
            updateMenuUI();
        }

        function retryLevel() { startLevel(state.currentUnit, state.currentLevel); }
        function goBack() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById('game-header').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            updateMenuUI();
        }

        function goToNextLevel() {
            let nextLevel = state.currentLevel + 1;
            const maxL = 3;
            if (nextLevel > maxL) goBack();
            else showInstruction(state.currentUnit, nextLevel);
        }

        function updateMenuUI() {
            ['A', 'B'].forEach(u => {
                const maxL = 3;
                for(let l=0; l<=maxL; l++) {
                    const btn = document.getElementById(`btn-${u}-${l}`);
                    if (!btn) continue;
                    const isUnlocked = state.teacherMode || (state.unlocked[u] >= l);
                    if (isUnlocked) {
                        btn.disabled = false;
                        if (l === 0) btn.className = "p-4 rounded-2xl bg-orange-100 text-orange-700 font-bold";
                        else btn.className = (u === 'A' ? "p-4 rounded-2xl bg-blue-100 text-blue-700 font-bold" : "p-4 rounded-2xl bg-purple-100 text-purple-700 font-bold");
                    } else {
                        btn.className = "p-4 rounded-2xl bg-gray-50 text-gray-300 font-bold";
                        btn.disabled = true;
                    }
                }
            });
        }

        function showComparison(canvas, target) {
            document.getElementById('level-view').classList.add('hidden');
            document.getElementById('compare-view').classList.remove('hidden');
            const preview = document.getElementById('user-draw-preview');
            preview.innerHTML = '';
            const img = new Image();
            img.src = canvas.toDataURL();
            img.className = "w-full h-full object-contain p-2";
            preview.appendChild(img);
            document.getElementById('correct-text-preview').innerText = target;
        }

        function retryWriting() { state.isRetrying = true; document.getElementById('compare-view').classList.add('hidden'); document.getElementById('level-view').classList.remove('hidden'); renderQuestion(); }
        function proceedAfterCompare() { state.isRetrying = false; document.getElementById('compare-view').classList.add('hidden'); document.getElementById('level-view').classList.remove('hidden'); handleAnswer(true); }

        function initCanvas(canvas, clearBtn) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
            ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
            let drawing = false;
            function getPos(e) { const b = canvas.getBoundingClientRect(); const x = (e.touches ? e.touches[0].clientX : e.clientX) - b.left; const y = (e.touches ? e.touches[0].clientY : e.clientY) - b.top; return {x, y}; }
            canvas.onmousedown = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.onmousemove = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            window.onmouseup = () => drawing = false;
            canvas.ontouchstart = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.ontouchmove = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.ontouchend = () => drawing = false;
            clearBtn.onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function handleTeacherClick() {
            state.teacherClicks++;
            if (state.teacherClicks >= 3) {
                state.teacherMode = !state.teacherMode;
                state.teacherClicks = 0;
                updateMenuUI();
                document.getElementById('teacher-toggle').classList.toggle('opacity-50', state.teacherMode);
            }
        }
        updateMenuUI();
    </script>
</body>
</html>
